<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Layout Lab — segment an image into draggable pieces</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4ecd9; color: #2d2618; }
    #root { min-height: 100vh; display: grid; grid-template-columns: 340px 1fr; }
    aside { padding: 16px; background: #fff8ea; border-right: 1px solid #d8caa8; height: 100vh; overflow: auto; }
    main { padding: 18px; overflow: auto; }
    h2 { margin: 0 0 4px; } h3 { margin: 16px 0 6px; }
    a { color: #6f5c25; }
    button, input[type="file"]::file-selector-button { border: 1px solid #8b7650; background: #fff1c9; color: #2d2618; border-radius: 10px; padding: 8px 10px; cursor: pointer; margin: 3px 3px 3px 0; font: inherit; }
    button:hover { background: #ffe6a3; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.primary { background: #d9c178; border-color: #6f5c25; font-weight: 600; }
    .row { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0 12px; }
    .hint { font-size: 13px; opacity: .8; line-height: 1.4; }
    .seg { display: inline-flex; border: 1px solid #8b7650; border-radius: 10px; overflow: hidden; margin: 6px 0 10px; }
    .seg button { border: 0; border-radius: 0; margin: 0; padding: 8px 14px; }
    .seg button.on { background: #d9c178; font-weight: 600; }
    label { display: block; margin: 9px 0; font-size: 14px; }
    input[type="range"] { width: 100%; }
    input[type="text"], input[type="number"] { padding: 6px; border-radius: 8px; border: 1px solid #d8caa8; background: #fffdf5; font: inherit; }
    .region { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; align-items: center; padding: 7px; margin: 6px 0; border: 1px solid #e2d2aa; border-radius: 10px; background: #fffdf5; }
    .region.active { outline: 2px solid #8b7650; }
    .region input[type="text"] { width: 100%; }
    .region .coords { grid-column: 1 / -1; font-family: ui-monospace, Menlo, monospace; font-size: 11px; opacity: .7; }
    .empty { padding: 40px; text-align: center; opacity: .65; border: 2px dashed #d8caa8; border-radius: 14px; }

    .stageOuter { width: max-content; transform-origin: top left; }
    .canvasWrap { position: relative; box-shadow: 0 6px 28px #0004; background: #fff; }
    .srcImg { display: block; user-select: none; -webkit-user-drag: none; }
    .drawSurface { position: absolute; inset: 0; cursor: crosshair; }
    .box { position: absolute; border: 2px solid #2f6f5c; background: #2f6f5c22; cursor: move; }
    .box.selected { border-color: #b4452f; background: #b4452f22; z-index: 3; }
    .box .tag { position: absolute; left: 0; top: -20px; background: #fff8eaf0; border: 1px solid #7b682f; border-radius: 6px 6px 6px 0; padding: 1px 5px; font-size: 11px; white-space: nowrap; }
    .box .handle { position: absolute; right: -6px; bottom: -6px; width: 12px; height: 12px; background: #fff; border: 2px solid #b4452f; border-radius: 3px; cursor: nwse-resize; }
    .box .draft { pointer-events: none; }

    .sheet { position: relative; background: #efe0bc; overflow: hidden; }
    .ghost { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
    .piece { position: absolute; touch-action: none; user-select: none; border: 1px dashed transparent; border-radius: 4px; cursor: grab; }
    .piece img { width: 100%; height: 100%; display: block; pointer-events: none; -webkit-user-drag: none; }
    .piece:hover { border-color: #7b682fcc; }
    .piece.selected { z-index: 5; border: 2px solid #6f5c25; box-shadow: 0 0 0 3px #fff7cfaa; cursor: grabbing; }
    .piece .badge { position: absolute; left: 2px; top: 2px; background: #fff8eadc; border: 1px solid #7b682f; border-radius: 6px; padding: 1px 5px; font-size: 11px; pointer-events: none; }
    @media (max-width: 900px) { #root { grid-template-columns: 1fr; } aside { height: auto; } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script>
const e = React.createElement;
const STORAGE_KEY = "layout-lab-state-v1";
const FIT_WIDTH = 860; // px the source preview fits into while drawing

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const uid = () => "r" + Math.random().toString(36).slice(2, 8);

function download(name, blob) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
function downloadJSON(name, data) {
  download(name, new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }));
}
function dataURLtoBlob(dataURL) {
  const [head, b64] = dataURL.split(",");
  const mime = head.match(/:(.*?);/)[1];
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// Crop a region (natural-px rect) out of an HTMLImageElement -> transparent PNG data URL
function cropToPNG(img, box) {
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(box.w));
  c.height = Math.max(1, Math.round(box.h));
  const ctx = c.getContext("2d");
  ctx.drawImage(img, box.x, box.y, box.w, box.h, 0, 0, c.width, c.height);
  return c.toDataURL("image/png");
}

/* ---------------- DEFINE MODE: draw region boxes on the source image ---------------- */
function DefineStage({ img, disp, boxes, setBoxes, selectedId, setSelectedId }) {
  const surfRef = React.useRef(null);
  const drag = React.useRef(null);
  const [draft, setDraft] = React.useState(null);

  const toNat = (ev) => {
    const r = surfRef.current.getBoundingClientRect();
    return {
      x: clamp((ev.clientX - r.left) / disp, 0, img.naturalWidth),
      y: clamp((ev.clientY - r.top) / disp, 0, img.naturalHeight),
    };
  };

  function surfaceDown(ev) {
    if (ev.target !== surfRef.current) return; // clicked a box, not empty space
    ev.preventDefault();
    setSelectedId(null);
    const p = toNat(ev);
    drag.current = { mode: "draw", ox: p.x, oy: p.y };
    surfRef.current.setPointerCapture(ev.pointerId);
    setDraft({ x: p.x, y: p.y, w: 0, h: 0 });
  }
  function boxDown(ev, box, mode) {
    ev.preventDefault(); ev.stopPropagation();
    setSelectedId(box.id);
    const p = toNat(ev);
    drag.current = { mode, id: box.id, ox: p.x, oy: p.y, start: { ...box } };
    surfRef.current.setPointerCapture(ev.pointerId);
  }
  function move(ev) {
    const d = drag.current; if (!d) return;
    const p = toNat(ev);
    if (d.mode === "draw") {
      setDraft({ x: Math.min(d.ox, p.x), y: Math.min(d.oy, p.y), w: Math.abs(p.x - d.ox), h: Math.abs(p.y - d.oy) });
    } else if (d.mode === "moveBox") {
      const dx = p.x - d.ox, dy = p.y - d.oy;
      const nx = clamp(d.start.x + dx, 0, img.naturalWidth - d.start.w);
      const ny = clamp(d.start.y + dy, 0, img.naturalHeight - d.start.h);
      setBoxes(prev => prev.map(b => b.id === d.id ? { ...b, x: nx, y: ny } : b));
    } else if (d.mode === "resizeBox") {
      const nw = clamp(p.x - d.start.x, 8, img.naturalWidth - d.start.x);
      const nh = clamp(p.y - d.start.y, 8, img.naturalHeight - d.start.y);
      setBoxes(prev => prev.map(b => b.id === d.id ? { ...b, w: nw, h: nh } : b));
    }
  }
  function up() {
    const d = drag.current; drag.current = null;
    if (d && d.mode === "draw" && draft && draft.w > 6 && draft.h > 6) {
      const n = boxes.length + 1;
      const box = { id: uid(), label: "Region " + n, x: Math.round(draft.x), y: Math.round(draft.y), w: Math.round(draft.w), h: Math.round(draft.h) };
      setBoxes(prev => [...prev, box]);
      setSelectedId(box.id);
    }
    setDraft(null);
  }

  const px = (n) => n * disp;
  return e("div", { className: "canvasWrap", style: { width: px(img.naturalWidth), height: px(img.naturalHeight) } },
    e("img", { className: "srcImg", src: img.src, width: px(img.naturalWidth), height: px(img.naturalHeight), draggable: false, alt: "source" }),
    e("div", {
      className: "drawSurface", ref: surfRef,
      onPointerDown: surfaceDown, onPointerMove: move, onPointerUp: up, onPointerCancel: up,
    },
      boxes.map(b => e("div", {
        key: b.id, className: "box" + (b.id === selectedId ? " selected" : ""),
        style: { left: px(b.x), top: px(b.y), width: px(b.w), height: px(b.h) },
        onPointerDown: ev => boxDown(ev, b, "moveBox"),
      },
        e("span", { className: "tag" }, b.label),
        e("div", { className: "handle", onPointerDown: ev => boxDown(ev, b, "resizeBox") })
      )),
      draft ? e("div", { className: "box draft", style: { left: px(draft.x), top: px(draft.y), width: px(draft.w), height: px(draft.h) } }) : null
    )
  );
}

/* ---------------- ARRANGE MODE: drag segmented PNG pieces ---------------- */
function Piece({ item, selected, showLabels, bounds, scale, onSelect, onMove }) {
  const drag = React.useRef(null);
  function down(ev) {
    ev.preventDefault(); ev.stopPropagation();
    onSelect(item.id);
    drag.current = { id: ev.pointerId, sx: ev.clientX, sy: ev.clientY, x: item.x, y: item.y };
    ev.currentTarget.setPointerCapture(ev.pointerId);
  }
  function move(ev) {
    const d = drag.current; if (!d || d.id !== ev.pointerId) return;
    const nx = clamp(Math.round(d.x + (ev.clientX - d.sx) / scale), 0, bounds.w - item.width);
    const ny = clamp(Math.round(d.y + (ev.clientY - d.sy) / scale), 0, bounds.h - item.height);
    onMove(item.id, nx, ny);
  }
  function up() { drag.current = null; }
  return e("div", {
    className: "piece" + (selected ? " selected" : ""),
    style: { left: item.x, top: item.y, width: item.width, height: item.height },
    onPointerDown: down, onPointerMove: move, onPointerUp: up, onPointerCancel: up, title: item.label,
  },
    e("img", { src: item.src, alt: item.label, draggable: false }),
    showLabels ? e("span", { className: "badge" }, item.label) : null
  );
}

function ArrangeStage({ pieces, setPieces, bounds, scale, ghost, ghostOpacity, showLabels, selectedId, setSelectedId }) {
  function move(id, x, y) { setPieces(prev => prev.map(p => p.id === id ? { ...p, x, y } : p)); }
  return e("div", { className: "stageOuter", style: { transform: `scale(${scale})` } },
    e("div", { className: "sheet", style: { width: bounds.w, height: bounds.h }, onPointerDown: () => setSelectedId(null) },
      ghost ? e("img", { className: "ghost", src: ghost, style: { opacity: ghostOpacity }, alt: "guide" }) : null,
      pieces.map(p => e(Piece, { key: p.id, item: p, selected: selectedId === p.id, showLabels, bounds, scale, onSelect: setSelectedId, onMove: move }))
    )
  );
}

/* ---------------- APP ---------------- */
function App() {
  const [img, setImg] = React.useState(null);          // HTMLImageElement (loaded source)
  const [mode, setMode] = React.useState("define");    // define | arrange
  const [boxes, setBoxes] = React.useState([]);        // regions in natural px
  const [pieces, setPieces] = React.useState([]);      // segmented draggable pieces
  const [selectedId, setSelectedId] = React.useState(null);
  const [scale, setScale] = React.useState(0.7);
  const [showLabels, setShowLabels] = React.useState(true);
  const [ghostOpacity, setGhostOpacity] = React.useState(0.15);
  const presetInput = React.useRef(null);

  const disp = img ? Math.min(1, FIT_WIDTH / img.naturalWidth) : 1;
  const bounds = img ? { w: img.naturalWidth, h: img.naturalHeight } : { w: 0, h: 0 };
  const selBox = boxes.find(b => b.id === selectedId);

  function loadImageSrc(src) {
    const im = new Image();
    im.onload = () => { setImg(im); setMode("define"); setPieces([]); setSelectedId(null); };
    im.src = src;
  }
  function onImageFile(ev) {
    const f = ev.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => loadImageSrc(reader.result);
    reader.readAsDataURL(f); // data URL keeps the canvas untainted so we can export crops
  }
  function onPresetFile(ev) {
    const f = ev.target.files[0]; if (!f) return;
    f.text().then(t => {
      const data = JSON.parse(t);
      const arr = Array.isArray(data) ? data : data.boxes;
      setBoxes(arr.map(b => ({ id: b.id || uid(), label: b.label || "Region", x: b.x, y: b.y, w: b.w, h: b.h })));
      setSelectedId(null);
    }).catch(() => alert("Could not read that preset JSON."));
  }

  function segment() {
    if (!img || !boxes.length) return;
    setPieces(boxes.map(b => ({ id: b.id, label: b.label, src: cropToPNG(img, b), x: b.x, y: b.y, width: b.w, height: b.h })));
    setSelectedId(null);
    setMode("arrange");
  }
  function resetPositions() { setPieces(prev => prev.map(p => { const b = boxes.find(x => x.id === p.id); return b ? { ...p, x: b.x, y: b.y } : p; })); }
  function downloadAllSegments() { pieces.forEach(p => download((p.label || p.id).replace(/[^\w.-]+/g, "_") + ".png", dataURLtoBlob(p.src))); }
  function patchBox(id, patch) { setBoxes(prev => prev.map(b => b.id === id ? { ...b, ...patch } : b)); }
  function deleteBox(id) { setBoxes(prev => prev.filter(b => b.id !== id)); if (selectedId === id) setSelectedId(null); }

  const sidebar = e("aside", null,
    e("h2", null, "Layout Lab"),
    e("p", { className: "hint" }, "Load an image, draw regions over it, then segment it into PNG pieces you can drag around. ", e("a", { href: "index.html" }, "Bearington demo →"), " ", e("a", { href: "map-maker.html" }, "Map Maker →")),

    e("h3", null, "1 · Source image"),
    e("label", null, e("input", { type: "file", accept: "image/png,image/jpeg,image/svg+xml,image/webp", onChange: onImageFile })),
    img ? e("p", { className: "hint" }, `Loaded ${img.naturalWidth}×${img.naturalHeight}px`) : null,

    img ? e("div", { className: "seg" },
      e("button", { className: mode === "define" ? "on" : "", onClick: () => setMode("define") }, "Define regions"),
      e("button", { className: mode === "arrange" ? "on" : "", onClick: () => setMode("arrange"), disabled: !pieces.length }, "Arrange pieces")
    ) : null,

    img && mode === "define" ? e("div", null,
      e("p", { className: "hint" }, "Drag on the image to draw a region. Drag a box to move it, use its corner handle to resize."),
      e("div", { className: "row" },
        e("button", { className: "primary", onClick: segment, disabled: !boxes.length }, `Segment into ${boxes.length} piece${boxes.length === 1 ? "" : "s"} →`),
        e("button", { onClick: () => { setBoxes([]); setSelectedId(null); } }, "Clear all")
      ),
      e("div", { className: "row" },
        e("button", { onClick: () => downloadJSON("preset.json", { image: { w: img.naturalWidth, h: img.naturalHeight }, boxes }), disabled: !boxes.length }, "Export preset"),
        e("button", { onClick: () => presetInput.current.click() }, "Import preset"),
        e("input", { type: "file", accept: "application/json", ref: presetInput, style: { display: "none" }, onChange: onPresetFile })
      ),
      e("h3", null, `Regions (${boxes.length})`),
      boxes.length ? boxes.map(b => e("div", { key: b.id, className: "region" + (b.id === selectedId ? " active" : ""), onClick: () => setSelectedId(b.id) },
        e("input", { type: "text", value: b.label, onChange: ev => patchBox(b.id, { label: ev.target.value }), onClick: ev => ev.stopPropagation() }),
        e("button", { onClick: ev => { ev.stopPropagation(); setSelectedId(b.id); } }, "•"),
        e("button", { onClick: ev => { ev.stopPropagation(); deleteBox(b.id); } }, "✕"),
        e("div", { className: "coords" }, `x:${Math.round(b.x)} y:${Math.round(b.y)} w:${Math.round(b.w)} h:${Math.round(b.h)}`)
      )) : e("p", { className: "hint" }, "No regions yet.")
    ) : null,

    img && mode === "arrange" ? e("div", null,
      e("p", { className: "hint" }, "Drag pieces to reposition. The faint original sits behind as a guide."),
      e("div", { className: "row" },
        e("button", { onClick: resetPositions }, "Reset positions"),
        e("button", { onClick: downloadAllSegments }, "Download PNGs"),
        e("button", { onClick: () => downloadJSON("layout.json", pieces.map(({ src, ...rest }) => rest)) }, "Export layout")
      ),
      e("label", null, `Zoom ${scale.toFixed(2)}×`, e("input", { type: "range", min: 0.2, max: 1.5, step: 0.05, value: scale, onChange: ev => setScale(Number(ev.target.value)) })),
      e("label", null, "Guide opacity", e("input", { type: "range", min: 0, max: 1, step: 0.01, value: ghostOpacity, onChange: ev => setGhostOpacity(Number(ev.target.value)) })),
      e("label", null, e("input", { type: "checkbox", checked: showLabels, onChange: ev => setShowLabels(ev.target.checked) }), " Show labels")
    ) : null
  );

  let stage;
  if (!img) {
    stage = e("div", { className: "empty" }, "Load a source image to begin.");
  } else if (mode === "define") {
    stage = e(DefineStage, { img, disp, boxes, setBoxes, selectedId, setSelectedId });
  } else {
    stage = e(ArrangeStage, { pieces, setPieces, bounds, scale, ghost: img.src, ghostOpacity, showLabels, selectedId, setSelectedId });
  }

  return e(React.Fragment, null, sidebar, e("main", null, stage));
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
