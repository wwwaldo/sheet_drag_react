<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bearington Draggable Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4ecd9; color: #2d2618; }
    #root { min-height: 100vh; display: grid; grid-template-columns: 320px 1fr; }
    aside { padding: 16px; background: #fff8ea; border-right: 1px solid #d8caa8; height: 100vh; overflow: auto; }
    main { padding: 18px; overflow: auto; }
    button, input[type="file"]::file-selector-button { border: 1px solid #8b7650; background: #fff1c9; color: #2d2618; border-radius: 10px; padding: 8px 10px; cursor: pointer; margin: 3px; }
    button:hover { background: #ffe6a3; }
    .row { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0 14px; }
    .hint { font-size: 13px; opacity: .78; line-height: 1.35; }
    .layer { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 8px; margin: 7px 0; border: 1px solid #e2d2aa; border-radius: 10px; background: #fffdf5; }
    .layer.active { outline: 2px solid #8b7650; }
    .coords { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; opacity: .72; grid-column: 1 / -1; }
    .stageOuter { width: max-content; }
    .sheet { position: relative; width: 1024px; height: 1536px; background: #efe0bc; box-shadow: 0 6px 28px #0004; overflow: hidden; transform-origin: top left; }
    .guide { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 0; }
    .piece { position: absolute; z-index: 1; touch-action: none; user-select: none; border: 1px dashed transparent; border-radius: 4px; cursor: grab; }
    .piece img { width: 100%; height: 100%; display: block; pointer-events: none; user-select: none; }
    .piece:hover { border-color: #7b682fcc; }
    .piece.selected { z-index: 5; border: 2px solid #6f5c25; box-shadow: 0 0 0 3px #fff7cfaa; cursor: grabbing; }
    .badge { position: absolute; left: 2px; top: 2px; background: #fff8eadc; border: 1px solid #7b682f; border-radius: 6px; padding: 2px 5px; font-size: 11px; pointer-events:none; }
    label { display: block; margin: 9px 0; }
    input[type="range"] { width: 100%; }
    select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #d8caa8; background: #fffdf5; color: #2d2618; font: inherit; }
    .resizePanel { display:grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .resizePanel input { width: 100%; padding: 6px; border-radius: 8px; border: 1px solid #d8caa8; background:#fffdf5; }
    @media (max-width: 900px) { #root { grid-template-columns: 1fr; } aside { height: auto; border-right: 0; border-bottom: 1px solid #d8caa8; } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script>
const e = React.createElement;
const STORAGE_KEY = "bearington-sheet-layout-v1";
const WOODLAND_CREATURE_VARIANTS = [
  { label: "Variant A", src: "assets/woodland_cleric_card_variant_a.png" },
  { label: "Variant B", src: "assets/woodland_cleric_card_variant_b.png" }
];
const DEFAULT_LAYOUT = [
  {
    "id": "header",
    "label": "01 Header",
    "src": "assets/01_header.png",
    "x": 0,
    "y": 0,
    "width": 370,
    "height": 215
  },
  {
    "id": "identity",
    "label": "02 Identity Box",
    "src": "assets/02_identity_box.png",
    "x": 385,
    "y": 20,
    "width": 320,
    "height": 225
  },
  {
    "id": "vitals",
    "label": "03 Vitals Box",
    "src": "assets/03_vitals_box.png",
    "x": 725,
    "y": 20,
    "width": 290,
    "height": 235
  },
  {
    "id": "abilities",
    "label": "04 Abilities Column",
    "src": "assets/04_abilities_column.png",
    "x": 18,
    "y": 250,
    "width": 180,
    "height": 525
  },
  {
    "id": "portraitFrame",
    "label": "05 Woodland Creature",
    "src": "assets/woodland_cleric_card_variant_a.png",
    "x": 205,
    "y": 250,
    "width": 500,
    "height": 525
  },
  {
    "id": "traits",
    "label": "06 Traits Box",
    "src": "assets/06_traits_box.png",
    "x": 720,
    "y": 260,
    "width": 295,
    "height": 525
  },
  {
    "id": "attacks",
    "label": "07 Attacks & Cantrips",
    "src": "assets/07_attacks_cantrips_box.png",
    "x": 218,
    "y": 910,
    "width": 500,
    "height": 205
  },
  {
    "id": "features",
    "label": "08 Features Box",
    "src": "assets/08_features_box.png",
    "x": 720,
    "y": 785,
    "width": 295,
    "height": 290
  },
  {
    "id": "miscStats",
    "label": "09 Misc Stats Box",
    "src": "assets/09_misc_stats_box.png",
    "x": 18,
    "y": 915,
    "width": 185,
    "height": 190
  },
  {
    "id": "proficiencies",
    "label": "10 Proficiencies Box",
    "src": "assets/10_proficiencies_box.png",
    "x": 215,
    "y": 1120,
    "width": 170,
    "height": 390
  },
  {
    "id": "equipment",
    "label": "11 Equipment Box",
    "src": "assets/11_equipment_box.png",
    "x": 18,
    "y": 1120,
    "width": 185,
    "height": 390
  },
  {
    "id": "spellcasting",
    "label": "12 Spellcasting Box",
    "src": "assets/12_spellcasting_box.png",
    "x": 385,
    "y": 1120,
    "width": 330,
    "height": 390
  },
  {
    "id": "channelDivinity",
    "label": "13 Channel Divinity",
    "src": "assets/13_channel_divinity_box.png",
    "x": 720,
    "y": 1090,
    "width": 295,
    "height": 185
  },
  {
    "id": "notes",
    "label": "14 Notes Box",
    "src": "assets/14_notes_box.png",
    "x": 720,
    "y": 1280,
    "width": 295,
    "height": 245
  }
];

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
function normalizeLayout(layout) {
  return layout.map(item => {
    if (item.id !== "portraitFrame") return item;
    const selectedVariant = WOODLAND_CREATURE_VARIANTS.find(variant => variant.src === item.src);
    return {
      ...item,
      label: "05 Woodland Creature",
      src: selectedVariant ? selectedVariant.src : WOODLAND_CREATURE_VARIANTS[0].src
    };
  });
}
function loadInitialLayout() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return saved ? normalizeLayout(saved) : DEFAULT_LAYOUT;
  }
  catch { return DEFAULT_LAYOUT; }
}

function SheetPiece({ item, selected, showLabels, onSelect, onMove, onUpdate }) {
  const dragRef = React.useRef(null);
  function pointerDown(ev) {
    ev.preventDefault();
    onSelect(item.id);
    const start = { pointerId: ev.pointerId, sx: ev.clientX, sy: ev.clientY, x: item.x, y: item.y };
    dragRef.current = start;
    ev.currentTarget.setPointerCapture(ev.pointerId);
  }
  function pointerMove(ev) {
    const d = dragRef.current;
    if (!d || d.pointerId !== ev.pointerId) return;
    const nextX = clamp(Math.round(d.x + ev.clientX - d.sx), 0, 1024 - item.width);
    const nextY = clamp(Math.round(d.y + ev.clientY - d.sy), 0, 1536 - item.height);
    onMove(item.id, nextX, nextY);
  }
  function pointerUp(ev) { dragRef.current = null; onUpdate(); }
  return e("div", {
    className: "piece" + (selected ? " selected" : ""),
    style: { left: item.x, top: item.y, width: item.width, height: item.height },
    onPointerDown: pointerDown,
    onPointerMove: pointerMove,
    onPointerUp: pointerUp,
    onPointerCancel: pointerUp,
    title: item.label
  },
    e("img", { src: item.src, alt: item.label, draggable: false }),
    showLabels ? e("span", { className: "badge" }, item.label) : null
  );
}

function Sheet({ layout, setLayout, selectedId, setSelectedId, guideOpacity, showLabels, scale }) {
  function move(id, x, y) { setLayout(prev => prev.map(it => it.id === id ? { ...it, x, y } : it)); }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(layout)); }
  React.useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(layout)); }, [layout]);
  return e("div", { className: "stageOuter", style: { transform: `scale(${scale})`, transformOrigin: "top left" } },
    e("div", { className: "sheet", onPointerDown: () => setSelectedId(null) },
      e("img", { className: "guide", src: "assets/full-sheet-guide.jpg", style: { opacity: guideOpacity }, alt: "Full sheet background guide" }),
      layout.map(item => e(SheetPiece, { key: item.id, item, selected: selectedId === item.id, showLabels, onSelect: setSelectedId, onMove: move, onUpdate: save }))
    )
  );
}

function App() {
  const [layout, setLayout] = React.useState(loadInitialLayout);
  const [selectedId, setSelectedId] = React.useState(null);
  const [guideOpacity, setGuideOpacity] = React.useState(0.28);
  const [showLabels, setShowLabels] = React.useState(true);
  const [scale, setScale] = React.useState(0.7);
  const selected = layout.find(x => x.id === selectedId);
  function reset() { setLayout(DEFAULT_LAYOUT.map(x => ({...x}))); localStorage.removeItem(STORAGE_KEY); }
  function patchSelected(patch) { if (!selected) return; setLayout(prev => prev.map(it => it.id === selected.id ? { ...it, ...patch } : it)); }
  function importFile(ev) {
    const file = ev.target.files[0]; if (!file) return;
    file.text().then(text => {
      const data = normalizeLayout(JSON.parse(text));
      setLayout(data);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    });
  }
  return e(React.Fragment, null,
    e("aside", null,
      e("h2", null, "Bearington Sheet Layout"),
      e("p", { className: "hint" }, "Drag components inside the Sheet. Positions and sizes live in layout data and autosave to localStorage. ", e("a", { href: "layout-lab.html", style: { color: "#6f5c25" } }, "Layout Lab →")),
      e("div", { className: "row" },
        e("button", { onClick: () => downloadJSON("bearington-layout.json", layout) }, "Export Layout"),
        e("button", { onClick: reset }, "Reset Layout"),
        e("button", { onClick: () => localStorage.setItem(STORAGE_KEY, JSON.stringify(layout)) }, "Save Now")
      ),
      e("label", null, "Import Layout JSON ", e("input", { type: "file", accept: "application/json", onChange: importFile })),
      e("label", null, "Background guide opacity ", e("input", { type: "range", min: 0, max: 1, step: 0.01, value: guideOpacity, onChange: ev => setGuideOpacity(Number(ev.target.value)) })),
      e("label", null, "Canvas zoom ", e("input", { type: "range", min: 0.25, max: 1.25, step: 0.05, value: scale, onChange: ev => setScale(Number(ev.target.value)) })),
      e("label", null, e("input", { type: "checkbox", checked: showLabels, onChange: ev => setShowLabels(ev.target.checked) }), " Show labels"),
      selected ? e("div", null,
        e("h3", null, "Selected: ", selected.label),
        selected.id === "portraitFrame" ? e("label", null, "Woodland creature artwork ",
          e("select", {
            value: selected.src,
            onChange: ev => patchSelected({ src: ev.target.value })
          }, WOODLAND_CREATURE_VARIANTS.map(variant =>
            e("option", { key: variant.src, value: variant.src }, variant.label)
          ))
        ) : null,
        e("div", { className: "resizePanel" },
          ["x","y","width","height"].map(key => e("label", { key }, key, e("input", { type:"number", value:selected[key], onChange: ev => patchSelected({ [key]: Number(ev.target.value) }) })))
        )
      ) : e("p", { className: "hint" }, "Select a piece to edit exact x/y/width/height."),
      e("h3", null, "Subcomponents"),
      layout.map(item => e("div", { key: item.id, className: "layer" + (item.id === selectedId ? " active" : ""), onClick: () => setSelectedId(item.id) },
        e("strong", null, item.label),
        e("button", { onClick: ev => { ev.stopPropagation(); setSelectedId(item.id); } }, "Select"),
        e("div", { className: "coords" }, `x:${item.x} y:${item.y} w:${item.width} h:${item.height}`)
      ))
    ),
    e("main", null,
      e(Sheet, { layout, setLayout, selectedId, setSelectedId, guideOpacity, showLabels, scale })
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
