<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bearington Character Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4ecd9; color: #2d2618; }
    #root { min-height: 100vh; display: grid; grid-template-columns: 320px 1fr; }
    #root.collapsed { grid-template-columns: 1fr; }
    #root.collapsed aside { display: none; }
    aside { padding: 16px; background: #fff8ea; border-right: 1px solid #d8caa8; height: 100vh; overflow: auto; }
    main { padding: 18px; overflow: auto; }
    h2 { margin: 0 0 6px; } h3 { margin: 16px 0 6px; }
    a { color: #6f5c25; }
    button, input[type="file"]::file-selector-button { border: 1px solid #8b7650; background: #fff1c9; color: #2d2618; border-radius: 10px; padding: 8px 10px; cursor: pointer; margin: 3px 3px 3px 0; font: inherit; }
    button:hover { background: #ffe6a3; }
    .collapseBtn { float: right; padding: 4px 9px; margin: 0; }
    .sidebarToggle { position: fixed; top: 12px; left: 12px; z-index: 100; box-shadow: 0 2px 8px #0004; }
    .row { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0 12px; }
    .hint { font-size: 13px; opacity: .8; line-height: 1.4; }
    label { display: block; margin: 9px 0; font-size: 14px; }
    input[type="range"] { width: 100%; }
    .variantPicker { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
    .variantOption { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px; border: 1px solid #d8caa8; border-radius: 10px; background: #fffdf5; cursor: pointer; width: 88px; margin: 0; font: inherit; }
    .variantOption img { width: 74px; height: 74px; object-fit: contain; border-radius: 6px; background: #efe0bc; }
    .variantOption span { font-size: 11px; opacity: .82; }
    .variantOption:hover { background: #ffe6a3; }
    .variantOption.active { outline: 2px solid #8b7650; border-color: #8b7650; background: #ffe6a3; }
    .stageOuter { width: max-content; transform-origin: top left; }
    .sheetSvg { display: block; box-shadow: 0 6px 28px #0004; background: #efe0bc; }
    .fieldInput { width: 100%; height: 100%; box-sizing: border-box; border: none; outline: none; background: transparent;
      font-family: "Palatino Linotype", Georgia, serif; font-size: 17px; color: #2f2a16; padding: 0 4px; line-height: 1; }
    .fieldInput::placeholder { color: rgba(47,42,22,0.34); }
    .fieldInput:hover { background: rgba(255,255,255,0.16); }
    .fieldInput:focus { background: rgba(255,255,255,0.28); box-shadow: 0 0 0 1px rgba(65,77,35,0.55); border-radius: 3px; }
    @media (max-width: 900px) { #root { grid-template-columns: 1fr; } aside { height: auto; } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script>
const e = React.createElement;
const FIELDS_KEY = "bearington-outer-fields-v1";
const PORTRAIT_KEY = "bearington-portrait-v1";
const LAYOUT_KEY = "bearington-outer-layout-v1";
const VB_W = 1122, VB_H = 1630;
const PORTRAIT = { x: 224, y: 250, w: 548, h: 720 };
const VARIANTS = [{"label": "Variant A", "src": "assets/woodland_cleric_card_variant_a.png"}, {"label": "Variant B", "src": "assets/woodland_cleric_card_variant_b.png"}, {"label": "Variant C", "src": "assets/woodland_cleric_card_variant_c.png"}, {"label": "Warrior", "src": "assets/woodland_warrior_bramble_variant_a.png"}];
const FIELDS = [{"id": "name", "x": 501, "y": 74, "w": 270, "h": 26, "label": "Name"}, {"id": "species", "x": 501, "y": 123, "w": 270, "h": 26, "label": "Species"}, {"id": "class", "x": 501, "y": 170, "w": 270, "h": 26, "label": "Class"}, {"id": "deity", "x": 501, "y": 216, "w": 270, "h": 26, "label": "Deity"}, {"id": "alignment", "x": 501, "y": 263, "w": 270, "h": 26, "label": "Alignment"}, {"id": "height", "x": 891, "y": 125, "w": 100, "h": 26, "label": "Height"}, {"id": "weight", "x": 1026, "y": 125, "w": 100, "h": 26, "label": "Weight"}, {"id": "age", "x": 986, "y": 213, "w": 105, "h": 26, "label": "Age"}, {"id": "strength", "x": 94, "y": 316, "w": 54, "h": 32, "label": "STR"}, {"id": "strength_mod", "x": 183, "y": 316, "w": 42, "h": 32, "label": "STR mod"}, {"id": "dexterity", "x": 94, "y": 436, "w": 54, "h": 32, "label": "DEX"}, {"id": "dexterity_mod", "x": 183, "y": 436, "w": 42, "h": 32, "label": "DEX mod"}, {"id": "constitution", "x": 94, "y": 556, "w": 54, "h": 32, "label": "CON"}, {"id": "constitution_mod", "x": 183, "y": 556, "w": 42, "h": 32, "label": "CON mod"}, {"id": "intelligence", "x": 94, "y": 678, "w": 54, "h": 32, "label": "INT"}, {"id": "intelligence_mod", "x": 183, "y": 678, "w": 42, "h": 32, "label": "INT mod"}, {"id": "wisdom", "x": 94, "y": 798, "w": 54, "h": 32, "label": "WIS"}, {"id": "wisdom_mod", "x": 183, "y": 798, "w": 42, "h": 32, "label": "WIS mod"}, {"id": "charisma", "x": 94, "y": 918, "w": 54, "h": 32, "label": "CHA"}, {"id": "charisma_mod", "x": 183, "y": 918, "w": 42, "h": 32, "label": "CHA mod"}, {"id": "inspiration", "x": 170, "y": 1062, "w": 45, "h": 26, "label": "Insp"}, {"id": "proficiency_bonus", "x": 170, "y": 1125, "w": 45, "h": 26, "label": "Prof"}, {"id": "passive_wisdom", "x": 170, "y": 1188, "w": 45, "h": 26, "label": "Passive"}, {"id": "trait_1", "x": 874, "y": 363, "w": 270, "h": 28, "label": "Personality trait"}, {"id": "trait_2", "x": 874, "y": 405, "w": 270, "h": 28, "label": "Personality trait"}, {"id": "trait_3", "x": 874, "y": 446, "w": 270, "h": 28, "label": "Personality trait"}, {"id": "ideal_1", "x": 874, "y": 553, "w": 270, "h": 28, "label": "Ideal"}, {"id": "ideal_2", "x": 874, "y": 595, "w": 270, "h": 28, "label": "Ideal"}, {"id": "bond_1", "x": 874, "y": 688, "w": 270, "h": 28, "label": "Bond"}, {"id": "bond_2", "x": 874, "y": 731, "w": 270, "h": 28, "label": "Bond"}, {"id": "flaw_1", "x": 874, "y": 828, "w": 270, "h": 28, "label": "Flaw"}, {"id": "flaw_2", "x": 874, "y": 870, "w": 270, "h": 28, "label": "Flaw"}, {"id": "attack_1", "x": 336, "y": 1063, "w": 155, "h": 24, "label": "Attack"}, {"id": "attack_bonus_1", "x": 541, "y": 1063, "w": 75, "h": 24, "label": "Atk"}, {"id": "damage_1", "x": 661, "y": 1063, "w": 165, "h": 24, "label": "Damage"}, {"id": "attack_2", "x": 336, "y": 1105, "w": 155, "h": 24, "label": "Attack"}, {"id": "attack_bonus_2", "x": 541, "y": 1105, "w": 75, "h": 24, "label": "Atk"}, {"id": "damage_2", "x": 661, "y": 1105, "w": 165, "h": 24, "label": "Damage"}, {"id": "attack_3", "x": 336, "y": 1147, "w": 155, "h": 24, "label": "Attack"}, {"id": "attack_bonus_3", "x": 541, "y": 1147, "w": 75, "h": 24, "label": "Atk"}, {"id": "damage_3", "x": 661, "y": 1147, "w": 165, "h": 24, "label": "Damage"}, {"id": "feature_1", "x": 871, "y": 943, "w": 300, "h": 26, "label": "Feature"}, {"id": "feature_2", "x": 871, "y": 985, "w": 300, "h": 26, "label": "Feature"}, {"id": "feature_3", "x": 871, "y": 1027, "w": 300, "h": 26, "label": "Feature"}, {"id": "feature_4", "x": 871, "y": 1069, "w": 300, "h": 26, "label": "Feature"}, {"id": "feature_5", "x": 871, "y": 1111, "w": 300, "h": 26, "label": "Feature"}, {"id": "equipment_1", "x": 58, "y": 1283, "w": 135, "h": 24, "label": "Equipment"}, {"id": "equipment_2", "x": 58, "y": 1328, "w": 135, "h": 24, "label": "Equipment"}, {"id": "equipment_3", "x": 58, "y": 1373, "w": 135, "h": 24, "label": "Equipment"}, {"id": "equipment_4", "x": 58, "y": 1418, "w": 135, "h": 24, "label": "Equipment"}, {"id": "equipment_5", "x": 58, "y": 1463, "w": 135, "h": 24, "label": "Equipment"}, {"id": "armor_prof", "x": 283, "y": 1272, "w": 105, "h": 24, "label": "Armor"}, {"id": "weapon_prof", "x": 283, "y": 1350, "w": 105, "h": 24, "label": "Weapons"}, {"id": "tool_prof", "x": 283, "y": 1428, "w": 105, "h": 24, "label": "Tools"}, {"id": "saving_throws", "x": 283, "y": 1516, "w": 105, "h": 24, "label": "Saves"}, {"id": "skills", "x": 283, "y": 1598, "w": 105, "h": 24, "label": "Skills"}, {"id": "spell_save_dc", "x": 493, "y": 1298, "w": 58, "h": 28, "label": "DC"}, {"id": "spell_attack_bonus", "x": 616, "y": 1298, "w": 58, "h": 28, "label": "Spell atk"}, {"id": "spellcasting_ability", "x": 744, "y": 1298, "w": 70, "h": 28, "label": "Ability"}, {"id": "cantrip_1", "x": 472, "y": 1406, "w": 350, "h": 22, "label": "Cantrip"}, {"id": "cantrip_2", "x": 472, "y": 1448, "w": 350, "h": 22, "label": "Cantrip"}, {"id": "spell_1_1", "x": 454, "y": 1546, "w": 70, "h": 20, "label": "Spell"}, {"id": "spell_2_1", "x": 548, "y": 1546, "w": 70, "h": 20, "label": "Spell"}, {"id": "spell_3_1", "x": 642, "y": 1546, "w": 70, "h": 20, "label": "Spell"}, {"id": "spell_4_1", "x": 736, "y": 1546, "w": 70, "h": 20, "label": "Spell"}, {"id": "spell_5_1", "x": 830, "y": 1546, "w": 70, "h": 20, "label": "Spell"}, {"id": "channel_divinity_1", "x": 871, "y": 1280, "w": 300, "h": 26, "label": "Channel"}, {"id": "channel_divinity_2", "x": 871, "y": 1323, "w": 300, "h": 26, "label": "Channel"}, {"id": "notes_1", "x": 871, "y": 1483, "w": 300, "h": 26, "label": "Note"}, {"id": "notes_2", "x": 871, "y": 1526, "w": 300, "h": 26, "label": "Note"}, {"id": "notes_3", "x": 871, "y": 1568, "w": 300, "h": 26, "label": "Note"}];

function loadJSON(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }

function VariantPicker({ variants, value, onChange }) {
  return e("div", { className: "variantPicker" },
    variants.map(v => e("button", { key: v.src, type: "button",
      className: "variantOption" + (v.src === value ? " active" : ""), title: v.label,
      "aria-pressed": v.src === value, onClick: () => onChange(v.src) },
      e("img", { src: v.src, alt: v.label, draggable: false }),
      e("span", null, v.label)
    ))
  );
}

function svgPoint(ev) {
  const svg = ev.currentTarget.ownerSVGElement;
  const pt = svg.createSVGPoint();
  pt.x = ev.clientX; pt.y = ev.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function Field({ f, pos, value, setValue, setFieldPos }) {
  const drag = React.useRef(null);
  function down(ev) {
    if (!ev.shiftKey) return;            // plain click -> focus & type
    ev.preventDefault(); ev.stopPropagation();
    const p = svgPoint(ev);
    drag.current = { sx: p.x, sy: p.y, ox: pos.x, oy: pos.y };
    try { ev.currentTarget.setPointerCapture(ev.pointerId); } catch (err) {}
  }
  function move(ev) {
    const d = drag.current; if (!d) return;
    const p = svgPoint(ev);
    setFieldPos(f.id, Math.round(d.ox + (p.x - d.sx)), Math.round(d.oy + (p.y - d.sy)));
  }
  function up() { drag.current = null; }
  return e("g", { transform: `translate(${pos.x},${pos.y})`, className: "fieldG",
      onPointerDown: down, onPointerMove: move, onPointerUp: up, onPointerCancel: up },
    e("foreignObject", { x: 0, y: 0, width: f.w, height: f.h },
      e("input", { className: "fieldInput", type: "text", value: value || "", placeholder: f.label,
        title: f.label + " — Shift+drag to move", onChange: ev => setValue(f.id, ev.target.value) })
    )
  );
}

function Sheet({ portraitSrc, values, setValue, layout, setFieldPos, scale }) {
  return e("div", { className: "stageOuter", style: { transform: `scale(${scale})` } },
    e("svg", { className: "sheetSvg", width: VB_W, height: VB_H, viewBox: `0 0 ${VB_W} ${VB_H}`, xmlns: "http://www.w3.org/2000/svg" },
      e("image", { href: "assets/outer_bg.png", x: 0, y: 0, width: VB_W, height: VB_H, preserveAspectRatio: "none" }),
      e("image", { href: portraitSrc, x: PORTRAIT.x, y: PORTRAIT.y, width: PORTRAIT.w, height: PORTRAIT.h, preserveAspectRatio: "xMidYMid meet" }),
      FIELDS.map(f => e(Field, { key: f.id, f, pos: layout[f.id] || { x: f.x, y: f.y }, value: values[f.id], setValue, setFieldPos }))
    )
  );
}

function App() {
  const [values, setValues] = React.useState(() => loadJSON(FIELDS_KEY, {}));
  const [layout, setLayout] = React.useState(() => loadJSON(LAYOUT_KEY, {}));
  const [portraitSrc, setPortraitSrc] = React.useState(() => loadJSON(PORTRAIT_KEY, VARIANTS[0].src));
  const [scale, setScale] = React.useState(0.62);
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  React.useEffect(() => { document.getElementById("root").classList.toggle("collapsed", !sidebarOpen); }, [sidebarOpen]);
  React.useEffect(() => { localStorage.setItem(FIELDS_KEY, JSON.stringify(values)); }, [values]);
  React.useEffect(() => { localStorage.setItem(LAYOUT_KEY, JSON.stringify(layout)); }, [layout]);
  React.useEffect(() => { localStorage.setItem(PORTRAIT_KEY, JSON.stringify(portraitSrc)); }, [portraitSrc]);

  function setValue(id, v) { setValues(prev => ({ ...prev, [id]: v })); }
  function setFieldPos(id, x, y) { setLayout(prev => ({ ...prev, [id]: { x, y } })); }
  function clearFields() { if (confirm("Clear all field text?")) setValues({}); }
  function resetPositions() { if (confirm("Reset all field positions?")) setLayout({}); }

  return e(React.Fragment, null,
    !sidebarOpen ? e("button", { className: "sidebarToggle", onClick: () => setSidebarOpen(true), title: "Show sidebar" }, "☰ Menu") : null,
    e("aside", null,
      e("button", { className: "collapseBtn", onClick: () => setSidebarOpen(false), title: "Collapse sidebar" }, "« Hide"),
      e("h2", null, "Bearington Character Sheet"),
      e("p", { className: "hint" }, "Click a line and type. ", e("strong", null, "Shift+drag"), " a field to move it. Text, positions, and portrait autosave to this browser. ", e("a", { href: "layout-lab.html" }, "Layout Lab →")),
      e("h3", null, "Character Portrait"),
      e("p", { className: "hint" }, "Choose the portrait shown in the sheet frame."),
      e(VariantPicker, { variants: VARIANTS, value: portraitSrc, onChange: setPortraitSrc }),
      e("h3", null, "Sheet"),
      e("label", null, `Zoom ${scale.toFixed(2)}×`, e("input", { type: "range", min: 0.3, max: 1.1, step: 0.05, value: scale, onChange: ev => setScale(Number(ev.target.value)) })),
      e("div", { className: "row" },
        e("button", { onClick: clearFields }, "Clear fields"),
        e("button", { onClick: resetPositions }, "Reset positions")
      ),
      e("p", { className: "hint" }, `${FIELDS.length} editable fields. Shift+drag to reposition.`)
    ),
    e("main", null, e(Sheet, { portraitSrc, values, setValue, layout, setFieldPos, scale }))
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
